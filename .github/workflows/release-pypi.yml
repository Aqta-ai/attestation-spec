name: Release to PyPI

# Publishes packages/verify-receipt-py to PyPI when a version tag is pushed.
# Uses PyPI Trusted Publishing (OIDC), which means:
#   - No long-lived API tokens stored as GitHub secrets.
#   - PyPI verifies the publish came from this repository's CI on a tag.
#   - Releases automatically get a Sigstore provenance attestation.
#
# To enable this workflow, configure trusted publishing on PyPI:
#   1. https://pypi.org/manage/project/aqta-verify-receipt/settings/publishing/
#   2. Add a publisher with these settings:
#        Owner:               Aqta-ai
#        Repository:          attestation-spec
#        Workflow filename:   release-pypi.yml
#        Environment name:    pypi
#   3. Save. No token needed.
#
# Trigger: push a tag matching `pyverify-v*` to start a release.
# Example:
#   git tag pyverify-v1.0.3 && git push origin pyverify-v1.0.3

on:
  push:
    tags:
      - "pyverify-v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build sdist and wheel
        working-directory: packages/verify-receipt-py
        run: python -m build

      - name: Validate metadata
        working-directory: packages/verify-receipt-py
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: pypi-distributions
          path: packages/verify-receipt-py/dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for OIDC authentication against PyPI
      id-token: write
      # Required for the action to attach Sigstore attestations to the release
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pypi-distributions
          path: dist/

      - name: Generate Sigstore attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
