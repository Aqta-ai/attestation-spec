name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python verifier
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install verifier
        working-directory: packages/verify-receipt-py
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run verifier tests
        run: pytest packages/verify-receipt-py/tests/ -v

  typescript:
    name: TypeScript verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        working-directory: packages/verify-receipt
        run: |
          npm ci
          npm run build

      - name: Run verifier tests
        working-directory: packages/verify-receipt
        run: node --test dist/index.test.js

  interop:
    name: Cross-implementation interop
    runs-on: ubuntu-latest
    needs: [python, typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python cryptography
        run: pip install cryptography

      - name: Build TypeScript verifier
        working-directory: packages/verify-receipt
        run: npm ci && npm run build

      - name: Run Python-issuer to TypeScript-verifier interop
        run: node scripts/make-interop-fixture.mjs

  vectors:
    name: Test vectors conformance
    runs-on: ubuntu-latest
    needs: [python, typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python verifier
        working-directory: packages/verify-receipt-py
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build TypeScript verifier
        working-directory: packages/verify-receipt
        run: npm ci && npm run build

      - name: Validate every test vector (Python)
        run: |
          python3 <<'PY'
          import json, pathlib, sys
          from aqta_verify_receipt import verify_receipt

          TRUSTED = "alWzEnrA_z9McN9z_MFfQCnH9mVgOwRZ26wrI7oix4E"
          V = pathlib.Path("test-vectors")
          errors = []

          for p in sorted((V / "valid").glob("*.json")):
              r = json.loads(p.read_text())
              res = verify_receipt(r, trusted_public_key=TRUSTED)
              if not res.valid:
                  errors.append(f"valid/{p.name} rejected: {res.reason}")

          for p in sorted((V / "invalid").glob("*.json")):
              r = json.loads(p.read_text())
              res = verify_receipt(r, trusted_public_key=TRUSTED)
              if res.valid:
                  errors.append(f"invalid/{p.name} accepted (should have been rejected)")

          if errors:
              print("Vector disagreements:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          print(f"All {len(list((V / 'valid').glob('*.json')))} valid and "
                f"{len(list((V / 'invalid').glob('*.json')))} invalid vectors "
                f"behave as specified (Python).")
          PY

      - name: Validate every test vector (TypeScript)
        run: |
          node <<'JS'
          const fs = require('node:fs');
          const path = require('node:path');
          const { verifyReceipt } = require('./packages/verify-receipt/dist/index.js');

          const TRUSTED = 'alWzEnrA_z9McN9z_MFfQCnH9mVgOwRZ26wrI7oix4E';
          const errors = [];

          for (const sub of ['valid', 'invalid']) {
            const shouldPass = sub === 'valid';
            for (const name of fs.readdirSync(path.join('test-vectors', sub)).sort()) {
              if (!name.endsWith('.json')) continue;
              const r = JSON.parse(fs.readFileSync(path.join('test-vectors', sub, name), 'utf8'));
              const { valid, reason } = verifyReceipt(r, { trustedPublicKey: TRUSTED });
              if (valid !== shouldPass) {
                errors.push(`${sub}/${name} behaved wrong (${reason || 'ok'})`);
              }
            }
          }
          if (errors.length) {
            console.error('Vector disagreements:');
            for (const e of errors) console.error('  ' + e);
            process.exit(1);
          }
          console.log('All test vectors behave as specified (TypeScript).');
          JS
