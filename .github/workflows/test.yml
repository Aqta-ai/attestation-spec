name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python verifier
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install verifier
        working-directory: packages/verify-receipt-py
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run verifier tests
        run: pytest packages/verify-receipt-py/tests/ -v

  typescript:
    name: TypeScript verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        working-directory: packages/verify-receipt
        run: |
          npm ci
          npm run build

      - name: Run verifier tests
        working-directory: packages/verify-receipt
        run: node --test dist/index.test.js

  interop:
    name: Cross-implementation interop
    runs-on: ubuntu-latest
    needs: [python, typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python cryptography
        run: pip install cryptography

      - name: Build TypeScript verifier
        working-directory: packages/verify-receipt
        run: npm ci && npm run build

      - name: Run Python-issuer to TypeScript-verifier interop
        run: node scripts/make-interop-fixture.mjs
