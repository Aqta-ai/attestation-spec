[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aqta-verify-receipt"
version = "1.0.5"
description = "Offline CLI and library for Seal ATTESTATION-v1 receipts. Ed25519 check of a signed model call; no account, no Aqta server required."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "Aqta Technologies Ltd" }]
keywords = [
    "seal",
    "aqta",
    "attestation-v1",
    "ed25519",
    "offline-verification",
    "ai-receipts",
    "model-call",
    "tamper-evident",
    "cli",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Legal Industry",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
]
dependencies = [
    "cryptography>=42.0.0",
]

[project.scripts]
aqta-verify-receipt = "aqta_verify_receipt.__main__:main"

[project.urls]
Homepage = "https://aqta.ai/verify"
Repository = "https://github.com/Aqta-ai/attestation-spec"
Documentation = "https://github.com/Aqta-ai/attestation-spec/blob/main/spec/ATTESTATION-v1.md"
Issues = "https://github.com/Aqta-ai/attestation-spec/issues"
"Public Key" = "https://api.aqta.ai/v1/attestation/public-key"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
aqta_verify_receipt = ["py.typed"]
